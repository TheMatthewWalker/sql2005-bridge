<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kongsberg // Warehouse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/warehouse.css">

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="brand-icon"><img src="./images/logo32.png" alt="Kongsberg Logo"></div>
      <a href="./landing.html" class="back-link">← Hub</a>
      <div class="brand-sep"></div>
      <div class="dept-badge">
        <svg viewBox="0 0 28 28" fill="none"><path d="M2 12L14 4l12 8v14H2V12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="10" y="16" width="8" height="10" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>
      </div>
      <span class="brand-name">Warehouse</span>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-dot"></div>
        <span>Connected</span>

      <p class="page-subtitle">Stock, inventory &amp; bin locations</p>

  <main class="main-content">

    <div class="placeholder-panel">
      <div class="placeholder-icon">
        <svg viewBox="0 0 28 28" fill="none"><path d="M2 12L14 4l12 8v14H2V12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="10" y="16" width="8" height="10" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>
      </div>
      <div class="placeholder-title">Warehouse — Coming Soon</div>
      <div class="placeholder-body">
        This area is reserved for the Warehouse department.<br>
        Content, tools and reports will be added here.
      </div>
      <a href="./landing.html" class="btn-back">← Return to Hub</a>
    </div>

  </main>

  <footer class="footer">
    Kongsberg Enterprise Portal &nbsp;·&nbsp; Warehouse &nbsp;·&nbsp; Authorised access only
  </footer>

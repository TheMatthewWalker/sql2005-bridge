<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kongsberg Nexus · Sales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/sales.css">
  <link rel="stylesheet" href="./css/nexus-common.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="brand-icon"><img src="./images/logo32.png" alt="Kongsberg Logo"></div>
      <a href="./landing.html" class="back-link">← Hub</a>
      <div class="brand-sep"></div>
      <div class="dept-badge">
        <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.8"/><circle cx="14" cy="14" r="6" stroke="currentColor" stroke-width="1.6"/><circle cx="14" cy="14" r="2" fill="currentColor"/></svg>
      </div>
      <span class="brand-name">Sales</span>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-dot"></div>
        <span>Connected</span>
      </div>
      <a href="/logout" class="btn-logout">Sign Out</a>
    </div>
  </header>

  <!-- PAGE TITLE BAR -->
  <div class="page-title-bar">
    <div class="page-title-inner">
      <h1 class="page-title">Sales</h1>
      <p class="page-subtitle">Orders, customers &amp; pipeline</p>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="placeholder-panel">
      <div class="placeholder-icon">
        <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.8"/><circle cx="14" cy="14" r="6" stroke="currentColor" stroke-width="1.6"/><circle cx="14" cy="14" r="2" fill="currentColor"/></svg>
      </div>
      <div class="placeholder-title">Sales — Coming Soon</div>
      <div class="placeholder-body">
        This area is reserved for the Sales department.<br>
        Content, tools and reports will be added here.
      </div>
      <a href="./landing.html" class="btn-back">← Return to Hub</a>
    </div>

  </main>

  <footer class="footer">
    <span>Kongsberg Nexus &nbsp;&middot;&nbsp; Authorised access only</span>
    <span class="footer-right">Sales</span>
  </footer>

</body>
</html>

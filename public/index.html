<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kongsberg // Secure Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon"><img src="./images/logo32.png" alt="Kongsberg Logo"></div>
        <span class="brand-name">Kongsberg</span>
      </div>
      <div class="brand-sub">Kongsberg Enterprise Portal</div>
    </div>

    <div class="card">
      <div class="card-title">Authentication</div>
      <form method="POST" action="/login">
        <div class="field">
          <label>Username</label>
          <input name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="submit-btn" type="submit">Authenticate</button>
        <div class="error-msg"></div>
      </form>
    </div>

    <div class="footer-note">Authorised access only &nbsp;·&nbsp; Session expires after 60 min</div>
  </div>
</body>
</html>

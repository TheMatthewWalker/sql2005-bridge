<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kongsberg // Secure Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --border:    #1e2535;
      --accent:    #00aaff;
      --accent2:   #0066cc;
      --muted:     #3a4560;
      --text:      #c8d6e8;
      --text-dim:  #5a6a85;
      --error:     #ff4466;
      --success:   #00cc88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,170,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,170,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(0,102,204,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .brand-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .brand-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
      opacity: 0.15;
    }

    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,170,255,0.08);
    }

    input::placeholder { color: var(--muted); }

    .submit-btn {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.99); }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.4s;
    }
    .submit-btn:hover::before { left: 100%; }

    .error-msg {
      margin-top: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--error);
      text-align: center;
      min-height: 18px;
    }

    .footer-note {
      margin-top: 28px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon"></div>
        <span class="brand-name">Kongsberg</span>
      </div>
      <div class="brand-sub">Production Intelligence Portal</div>
    </div>

    <div class="card">
      <div class="card-title">Authentication</div>
      <form method="POST" action="/login">
        <div class="field">
          <label>Username</label>
          <input name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="submit-btn" type="submit">Authenticate</button>
        <div class="error-msg"></div>
      </form>
    </div>

    <div class="footer-note">Authorised access only &nbsp;·&nbsp; Session expires after 60 min</div>
  </div>
</body>
</html>
